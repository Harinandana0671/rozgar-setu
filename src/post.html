<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - Rozgar Setu</title> 
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
    <header class="page-header">
        <button onclick="history.back()" class="back-btn">←</button>
        <h1>Post a Job</h1>
    </header>

    <main>
        <div class="form-container">
            <form id="jobForm" onsubmit="saveJobPost(event)">
                <div class="form-group">
                    <label>Job Title *</label>
                    <input type="text" id="jobTitle" required placeholder="e.g. Need a plumber">
                </div>

                <div class="form-group">
                    <label>Type of Worker *</label>
                    <select id="workType" required>
                        <option value="">Select worker type</option>
                        <option value="Mason">Mason</option>
                        <option value="Plumber">Plumber</option>
                        <option value="Electrician">Electrician</option>
                        <option value="Carpenter">Carpenter</option>
                        <option value="Painter">Painter</option>
                        <option value="Driver">Driver</option>
                        <option value="Domestic Help">Domestic Help</option>
                        <option value="Construction">Construction</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>City *</label>
                    <input type="text" id="city" required placeholder="Enter city">
                </div>

                <div class="form-group">
                    <label>Area *</label>
                    <input type="text" id="area" required placeholder="Enter area">
                </div>

                <div class="form-group">
                    <label>When? *</label>
                    <select id="when" required>
                        <option value="Today">Today</option>
                        <option value="Tomorrow">Tomorrow</option>
                        <option value="This Week">This Week</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Payment (₹) *</label>
                    <input type="text" id="pay" required placeholder="e.g. 500-800">
                </div>

                <div class="form-group">
                    <label>Job Description *</label>
                    <textarea id="description" rows="3" required placeholder="Describe the work..."></textarea>
                </div>

                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" id="contactName" required placeholder="Your name">
                </div>

                <div class="form-group">
                    <label>Your Phone *</label>
                    <input type="tel" id="contactPhone" required placeholder="10-digit mobile number">
                </div>

                <button type="submit" class="primary-btn">Post Job</button>
            </form>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="search-results.html" class="nav-item">
            <span class="nav-icon">🔍</span>
            <span>Search</span>
        </a>
        <a href="add-profile.html" class="nav-item">
            <span class="nav-icon">➕</span>
            <span>Add Profile</span>
        </a>
        <a href="post.html" class="nav-item active">
            <span class="nav-icon">📋</span>
            <span>Post Job</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>

    <script src="main.js"></script>
    <script>
        // Override saveJob if needed for custom behavior
        function saveJobPost(event) {
            event.preventDefault();
            
            var job = {
                title: document.getElementById('jobTitle').value,
                workType: document.getElementById('workType').value,
                city: document.getElementById('city').value,
                area: document.getElementById('area').value,
                when: document.getElementById('when').value,
                pay: document.getElementById('pay').value,
                description: document.getElementById('description').value,
                contactName: document.getElementById('contactName').value,
                contactPhone: document.getElementById('contactPhone').value,
                date: new Date().toLocaleString()
            };
            
            var jobs = JSON.parse(localStorage.getItem('jobPosts') || '[]');
            jobs.push(job);
            localStorage.setItem('jobPosts', JSON.stringify(jobs));
            
            alert('Job posted successfully!');
            window.location.href = 'worker-dashboard.html';
        }

        // Handle form submission
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('jobForm');
            if (form) {
                form.onsubmit = saveJobPost;
            }
        });
    </script>
</body>
</html>
